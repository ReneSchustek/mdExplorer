name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  publish:
    name: Publish self-contained Windows build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained win-x64, single file)
        run: >
          dotnet publish MdExplorer.App/MdExplorer.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Package portable artifact (zip)
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "MdExplorer-${{ github.ref_name }}-win-x64.zip"

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          # Installer-Version aus dem Tag ableiten (ohne fuehrendes 'v'),
          # damit Setup-Version und Release-Tag stets uebereinstimmen.
          $version = "${{ github.ref_name }}".TrimStart('v')
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DSourceDir=$((Resolve-Path publish).Path)" "/DMyAppVersion=$version" installer\MdExplorer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC fehlgeschlagen." }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MdExplorer-${{ github.ref_name }}-win-x64.zip
            dist/MdExplorer-*-setup.exe
          generate_release_notes: true
