name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  publish:
    name: Publish self-contained Windows build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained win-x64, single file)
        run: >
          dotnet publish MdExplorer.App/MdExplorer.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Package artifact
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "MdExplorer-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MdExplorer-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
